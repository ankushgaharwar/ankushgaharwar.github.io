<!DOCTYPE html>
<html>
<style>
* {
    box-sizing: border-box;
}

body {
    margin: 0;
    font-family: Arial;
    background-color: #e3feff ;
}

.header {
    text-align: center;
    padding: 32px;
}

/* Create four equal columns that floats next to each other */
.column {
    float: left;
    width: 25%;
    padding: 10px;
}

.column img {
    margin-top: 12px;
}

/* Clear floats after the columns */
.row:after {
    content: "";
    display: table;
    clear: both;
}

/* Responsive layout - makes a two column-layout instead of four columns */
@media (max-width: 800px) {
    .column {
        width: 50%;
    }
}

/* Responsive layout - makes the two columns stack on top of each other instead of next to each other */
@media (max-width: 600px) {
    .column {
        width: 100%;
    }
}
</style>
<body>

<!-- Header -->
<div class="header"><p><font color=" #4c4f06 ">
  <h3>  </h3> </font>
</p>
</div>

<!-- Photo Grid -->
<center><h3><bold>CARTOONS</bold></h3></center>

<div class="row"> 
  

<div class="column">
<a href="1.png"><img src="1.png" style="width:100%"></a>

<a href="3.PNG"><img src="3.PNG" style="width:100%"></a>
<a href="4.png"><img src="4.png" style="width:100%"></a>
  </div>

<a href="8.png"><img src="8.png" style="width:100%"></a>
</div>  
  

<div class="column">

</html>
