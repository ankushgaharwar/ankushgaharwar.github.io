<!DOCTYPE html>
<html>
<style>
* {
    box-sizing: border-box;
}

body {
    margin: 0;
    font-family: Arial;
    background-color: #e3feff ;
}

.header {
    text-align: center;
    padding: 32px;
}

/* Create four equal columns that floats next to each other */
.column {
    float: left;
    width: 25%;
    padding: 10px;
}

.column img {
    margin-top: 12px;
}

/* Clear floats after the columns */
.row:after {
    content: "";
    display: table;
    clear: both;
}

/* Responsive layout - makes a two column-layout instead of four columns */
@media (max-width: 800px) {
    .column {
        width: 50%;
    }
}

/* Responsive layout - makes the two columns stack on top of each other instead of next to each other */
@media (max-width: 600px) {
    .column {
        width: 100%;
    }
}
</style>
<body>

<!-- Header -->
<div class="header"><p><font color=" #4c4f06 ">
  <h3>SRM Desk App</h3> </font>
</p>
</div>

<!-- Photo Grid -->
<div class="row"> 
  

<div class="column">
    <a href="1.jpg"><img src="1.jpg" style="width:100%"></a>

    
    
    
   
  </div>
  

<div class="column">
<a href="2.jpg"><img src="2.jpg" style="width:100%"></a>
<a href="5.jpg"><img src="5.jpg" style="width:100%"></a>

  </div>  
  

<div class="column">
<a href="3.jpg"><img src="3.jpg" style="width:100%"></a>
<a href="6.jpg"><img src="6.jpg" style="width:100%"></a>

  </div>
  

<div class="column">
<a href="4.jpg"><img src="4.jpg" style="width:100%"></a>
  </div>
</div>

</body>
</html>
